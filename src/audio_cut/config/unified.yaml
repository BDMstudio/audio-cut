# File: src/audio_cut/config/unified.yaml
# AI-SUMMARY: v2.7 slim user-facing config; expert defaults live in config/expert.yaml.

global:
  default_mode: v2.2_mdd  # modes: all; code: run_splitter/main mode resolver
  version: "2.7.0-beta"  # modes: all; code: ConfigManager metadata

smart_cut:
  profile: auto  # modes: vpbd_acoustic/vpbd_asr; code: SeamlessSplitter._apply_smart_cut_runtime
  cut_style: natural  # modes: vpbd_acoustic/vpbd_asr; code: audio_cut.config.auto_profile
  target_duration_s: [5.0, 12.0]  # modes: split modes; code: derive_smart_cut_overrides
  lyrics: auto  # modes: vpbd_asr; code: lyrics provider selection

audio:
  sample_rate: 44100  # modes: all; code: ConfigManager._validate_audio_config
  channels: 1  # modes: all; code: ConfigManager._validate_audio_config
  format: wav  # modes: export; code: audio loader/export defaults
  quality: 320  # modes: mp3 export; code: audio_export bitrate defaults

gpu_pipeline:
  enable: true  # modes: separation; code: EnhancedVocalSeparator/GPU pipeline
  prefer_device: cuda  # modes: separation; code: PipelineConfig device selection
  strict_gpu: false  # modes: separation; code: strict GPU fallback guard

lyrics_alignment:
  enabled: false  # modes: vpbd_asr; code: LyricsAlignmentConfig
  provider: disabled  # modes: vpbd_asr; code: provider selection
  strict: false  # modes: vpbd_asr; code: ASR fallback policy
  fixture_path: null  # modes: tests/fake ASR; code: FakeLyricsProvider
  chunk_s: 35.0  # modes: FireRed ASR; code: lyrics_chunker
  overlap_s: 1.0  # modes: FireRed ASR; code: lyrics_chunker
  max_chunk_s: 55.0  # modes: FireRed ASR; code: FireRed AED limit guard
  cache_enabled: true  # modes: vpbd_asr; code: lyrics timeline cache

fire_red:
  provider_order: [sidecar, cli, null]  # modes: vpbd_asr; code: provider selection fallback chain
  endpoint: null  # modes: FireRed sidecar; code: FireRedSidecarProvider
  health_path: /health  # modes: FireRed sidecar; code: health probe
  analyze_path: /analyze  # modes: FireRed sidecar; code: analyze request
  cli:
    executable: null  # modes: FireRed CLI; code: FireRedCliProvider
    model_dir: null  # modes: FireRed CLI; code: FireRedCliProvider
    timeout_s: 120.0  # modes: FireRed CLI; code: subprocess timeout

output:
  directory: "./output"  # modes: all export modes; code: output directory resolver
  format: wav  # modes: all export modes; code: audio_export registry
  wav:
    subtype: PCM_24  # modes: wav export; code: soundfile writer
  mp3:
    bitrate: 320k  # modes: mp3 export; code: pydub exporter
  naming:
    pattern: "segment_{index:03d}_{label}_{duration}"  # modes: segment export; code: filename builder
    include_timestamp: true  # modes: segment export; code: output naming
    include_duration: true  # modes: segment export; code: output naming
  export_manifest: true  # modes: all split modes; code: SegmentManifest writer
  manifest_filename: "SegmentManifest.json"  # modes: all split modes; code: manifest path resolver

logging:
  level: INFO  # modes: all; code: logging setup
  file: "smart_splitter.log"  # modes: all; code: logging setup
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"  # modes: all; code: logging setup
